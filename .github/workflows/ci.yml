name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # bpmn-to-image/puppeteer are dev-only; the BPMN e2e test is gated by
  # BPMN_E2E and does not run in CI — skip the Chromium download entirely.
  PUPPETEER_SKIP_DOWNLOAD: '1'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
