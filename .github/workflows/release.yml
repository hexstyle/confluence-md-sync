# Publishes the package to npm when a version tag (v*) is pushed.
#
# Release flow:
#   npm version patch|minor|major   # bumps package.json and creates the tag
#   git push --follow-tags
#
# Requires the NPM_TOKEN repository secret (npm automation token with
# publish rights). `--provenance` attaches a verifiable build attestation
# (needs id-token: write and a public repo).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

env:
  PUPPETEER_SKIP_DOWNLOAD: '1'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Check tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "$PKG_VERSION" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
